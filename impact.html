<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact — DontMailMe</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <a href="/" class="brand">DontMailMe.org</a>
    <nav class="nav-links">
        <a href="/gmail">Gmail Tool</a>
        <a href="/outlook">Outlook</a>
        <a href="/impact">Impact</a>
    </nav>
</header>

<main>
    <section class="impact-hero" style="text-align: center; padding: 100px 20px;">
        <h1 id="tree-counter" style="font-size: 8rem; margin: 0; line-height: 1;">...</h1>
        <p style="font-size: 1.5rem; color: var(--text-muted); margin-top: 24px;">Trees planted by our community.</p>
        <a href="/" class="btn" style="margin-top: 48px;">Join the movement</a>
    </section>
</main>

<footer>
    <p>A Green IT Suite initiative. Built for personal productivity and planetary health.</p>
    <div style="margin-top: 16px; display: flex; justify-content: center; gap: 16px;">
        <a href="https://github.com/sein-io/dontmailme">GitHub</a>
        <a href="/privacy">Privacy</a>
        <a href="/imprint">Imprint</a>
    </div>
</footer>

<script>
    async function fetchImpact() {
        const counter = document.getElementById('tree-counter');
        try {
            const response = await fetch('https://dontmailme-api.late-sound-79c8.workers.dev/stats');
            if (response.ok) {
                counter.textContent = await response.text();
            } else {
                counter.textContent = '0';
            }
        } catch (e) {
            counter.textContent = '0';
        }
    }
    fetchImpact();
</script>
</body>
</html>
